services:
  # ===============================
  # GPU MODE
  # ===============================
  libretranslate:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    profiles: ["gpu"]
    container_name: libretranslate
    gpus: all

    ports:
      - "5000:5000"

    environment:
      LT_LOAD_ONLY: "en,vi"
      LT_THREADS: "3"             # match max_concurrency=3
      LT_DISABLE_WEB_UI: "true"
      LT_DISABLE_FILES_TRANSLATION: "true"

      CT2_FORCE_CUDA: "1"
      CT2_CUDA_ALLOW_FP16: "1"
      CUDA_VISIBLE_DEVICES: "0"
      CT2_CUDA_MEMORY_FRACTION: "0.7"

    deploy:
      resources:
        limits:
          memory: "4G"            # cap RAM — GPU mode dùng VRAM là chính

    volumes:
      - lt-models:/root/.local

    restart: unless-stopped


  # ===============================
  # CPU MODE (override same service name)
  # ===============================
  libretranslate-cpu:
    image: libretranslate/libretranslate
    profiles: ["cpu"]
    container_name: libretranslate

    ports:
      - "5000:5000"

    environment:
      LT_LOAD_ONLY: "en,vi"
      LT_THREADS: "3"             # match max_concurrency=3
      LT_DISABLE_WEB_UI: "true"
      LT_DISABLE_FILES_TRANSLATION: "true"
      OMP_NUM_THREADS: "3"        # CTranslate2 inter-op threads
      OPENBLAS_NUM_THREADS: "3"   # BLAS threads (dùng nếu backend là OpenBLAS)

    deploy:
      resources:
        limits:
          cpus: "4.0"             # cap CPU — tránh chiếm hết host
          memory: "4G"            # cap RAM

    volumes:
      - lt-models:/home/libretranslate/.local

    restart: unless-stopped

volumes:
  lt-models: